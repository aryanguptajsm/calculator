<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Simple Calculator</h1>
    <div id="calculator">
        <input type="text" id="display" disabled>
        <div id="buttons">
            <button class="btn" id="clear" onclick="clearDisplay()">C</button>
            <button class="btn" data-value="7" onclick="appendToDisplay('7')">7</button>
            <button class="btn" data-value="8" onclick="appendToDisplay('8')">8</button>
            <button class="btn" data-value="9" onclick="appendToDisplay('9')">9</button>
            <button class="btn" data-value="/" onclick="appendToDisplay('/')">/</button>
            <button class="btn" data-value="4" onclick="appendToDisplay('4')">4</button>
            <button class="btn" data-value="5" onclick="appendToDisplay('5')">5</button>
            <button class="btn" data-value="6" onclick="appendToDisplay('6')">6</button>
            <button class="btn" data-value="%" onclick="appendToDisplay('%')">%</button>
            <button class="btn" data-value="3" onclick="appendToDisplay('3')">3</button>
            <button class="btn" data-value="2" onclick="appendToDisplay('2')">2</button>
            <button class="btn" data-value="1" onclick="appendToDisplay('1')">1</button>
             <button class="btn" data-value="*" onclick="appendToDisplay('*')">*</button>
            <button class="btn" data-value="-" onclick="appendToDisplay('-')">-</button>
            <button class="btn" data-value="0" onclick="appendToDisplay('0')">0</button>
            <button class="btn" data-value "." onclick="appendToDisplay('.')">.</button>
            <button class="btn" id="equals" onclick="calculate()">=</button>
            <button class="btn" data-value "+" onclick="appendToDisplay('+')">+</button>
            <button class="btn" id="delete" onclick="deleteLast()">DEL</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
